# Training hyperparameters for YOLOv8 on the CUAS challenge.
# Tuned for small-object detection (drones at range are a small % of frame).

model: yolov8s.pt      # COCO-pretrained backbone (allowed under Rule 3)
epochs: 150
imgsz: 960              # larger than default 640 — helps small object recall
batch: 16
patience: 25            # early stopping
optimizer: auto
lr0: 0.01
mosaic: 1.0              # mosaic augmentation (allowed under Rule 4)
copy_paste: 0.3           # copy-paste augmentation (allowed under Rule 4)
scale: 0.5
translate: 0.1
fliplr: 0.5
flipud: 0.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
close_mosaic: 15          # disable mosaic for last N epochs to stabilize
device: 0                 # set to 'cpu' if no GPU available
project: runs/detect
name: cuas_train
